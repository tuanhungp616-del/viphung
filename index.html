<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HƯNG DZKK • DORAEMON GOD MODE 3.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dora-blue: #00aaff;
      --dora-yellow: #ffcc00;
      --red: #ff0000;
      --green: #00ff00;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background: radial-gradient(circle at 50% 20%, #00aaff, #001133 80%); 
      color: #fff; min-height: 100vh; overflow-x: hidden; 
      font-family: 'Comic Neue', cursive; position: relative;
    }
    canvas#particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.8; pointer-events:none; }

    .glass-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); border: 4px solid #ffcc00; border-radius: 30px; box-shadow: 0 0 40px #ffcc00; }
    .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 2; }

    /* LOGIN */
    #login-screen { position: fixed; inset: 0; background: rgba(0,170,255,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 400px; padding: 60px 40px; text-align: center; background: #fff; border-radius: 30px; box-shadow: 0 0 50px #ffcc00; }
    .input-box { width: 100%; background: #f0f8ff; border: 4px solid #00aaff; color: #00aaff; padding: 22px; border-radius: 20px; font-size: 1.4rem; text-align: center; }
    .btn-luxury { width: 100%; padding: 20px; background: linear-gradient(90deg, #ffcc00, #00aaff); color: #000; font-weight: 900; font-size: 1.4rem; border-radius: 25px; margin-top: 25px; }

    /* TOOL DISPLAY */
    #tool-display { text-align: center; margin-top: 30px; }
    #tool-image { width: 220px; height: 220px; margin: 0 auto 20px; border: 8px solid #ffcc00; border-radius: 50%; box-shadow: 0 0 40px #ffcc00; transition: all 0.4s; }
    .red-glow { animation: flashRed 0.6s infinite alternate; }
    .green-glow { animation: flashGreen 0.6s infinite alternate; }
    @keyframes flashRed { from { box-shadow: 0 0 40px #ff0000; } to { box-shadow: 0 0 80px #ff0000; } }
    @keyframes flashGreen { from { box-shadow: 0 0 40px #00ff00; } to { box-shadow: 0 0 80px #00ff00; } }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box glass-panel">
    <h1 style="color:#00aaff;">🛎️ DORAEMON</h1>
    <p style="color:#ffcc00; margin:20px 0 35px; font-size:1.4rem;">GOD MODE 3.0</p>
    <input type="password" id="login-key" class="input-box" placeholder="NHẬP KEY...">
    <button onclick="submitLogin()" class="btn-luxury">🚀 KHỞI ĐỘNG</button>
    <div id="login-msg" class="mt-4 fw-bold" style="color:#ff00ff;"></div>
  </div>
</div>
<!-- MAIN TOOL -->
<div class="container" id="main-tool" style="display:none;">
  <div class="header glass-panel">
    <h1>🛎️ DORAEMON</h1>
    <div class="badge">GOD MODE 3.0 • PHIÊN TIẾP THEO</div>
  </div>

  <div class="tool-grid">
    <!-- Các tool card giữ nguyên như trước -->
    <!-- Bạn copy tool-grid từ phiên bản trước vào đây -->
  </div>
</div>

<!-- GAME OVERLAY - GIAO DIỆN MỚI -->
<div id="game-overlay" style="display:none; position:fixed; inset:0; z-index:2000; background:#001133;">
  <div style="width:100%; background:linear-gradient(90deg,#00aaff,#ffcc00); color:#000; padding:16px; border-bottom:4px solid #ffcc00; display:flex; align-items:center; gap:15px; font-family:'Comic Neue'; font-size:16px; font-weight:700;">
    <i class="fas fa-infinity fa-spin"></i>
    <marquee scrollamount="12">🛎️ DORAEMON GOD MODE 3.0</marquee>
    <div id="three-dot-menu" onclick="toggleMenu()" style="position:absolute; top:22px; right:30px; font-size:32px; cursor:pointer; color:#000;">⋮</div>
  </div>

  <button onclick="closeGame()" style="position:absolute; top:28px; left:28px; background:#000; color:#ffcc00; border:3px solid #ffcc00; padding:14px 34px; border-radius:50px; font-weight:900; z-index:9999;">✕ THOÁT</button>

  <iframe id="game-frame" src="" style="width:100%; height:100%; border:none;"></iframe>

  <!-- TOOL DISPLAY MỚI -->
  <div id="tool-display" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; z-index:2005; width:100%; max-width:420px;">
    <div style="display:flex; justify-content:center; align-items:center; gap:40px; margin-bottom:20px;">
      <!-- Bên trái - Đỏ = Tài -->
      <div style="width:80px; height:80px; background:#ff0000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; color:#fff; box-shadow:0 0 30px #ff0000;">T</div>
      
      <!-- Ảnh tool ở giữa -->
      <div id="tool-image-container">
        <img id="tool-image" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png" style="width:220px; height:220px; border:8px solid #ffcc00; border-radius:50%; box-shadow:0 0 40px #ffcc00;">
      </div>
      
      <!-- Bên phải - Xanh = Xỉu -->
      <div style="width:80px; height:80px; background:#00ff00; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; color:#fff; box-shadow:0 0 30px #00ff00;">X</div>
    </div>

    <!-- Countdown -->
    <div id="countdown-box" style="font-size:22px; color:#ffcc00; font-weight:700; margin-top:10px; display:none;">
      ĐỢI <span id="countdown" style="font-size:32px;">15</span> GIÂY
    </div>

    <!-- Mã phiên bên phải dưới -->
    <div style="position:absolute; bottom:20px; right:30px; background:#000; color:#ffcc00; padding:8px 20px; border-radius:20px; font-size:15px; font-weight:700;">
      PHIÊN: <span id="auto-phien" style="color:#ffd700;"></span>
    </div>

    <!-- Kết quả báo dưới -->
    <div id="result-text" style="position:absolute; bottom:80px; left:30px; font-size:28px; font-weight:900; display:none;"></div>
  </div>

  <!-- Bridge panel & Big center giữ nguyên hoặc ẩn nếu cần -->
</div>

<script>
/* Logic JavaScript (giữ nguyên + thêm animation nháy) */
let isAnalyzing = false;

function startAutoAPI(tool, url) {
  document.getElementById('game-overlay').style.display = "block";
  // ... (gọi loopAuto như cũ)
}

async function loopAuto() {
  // ... (logic cũ)
  // Khi có kết quả:
  if (data.du_doan === "TÀI") {
    document.getElementById('tool-image').classList.add('red-glow');
    document.getElementById('result-text').innerHTML = '🔴 <b>TÀI</b>';
    document.getElementById('result-text').style.color = '#ff0000';
  } else {
    document.getElementById('tool-image').classList.add('green-glow');
    document.getElementById('result-text').innerHTML = '🟢 <b>XỈU</b>';
    document.getElementById('result-text').style.color = '#00ff00';
  }
  document.getElementById('result-text').style.display = 'block';
}

/* Đừng quên copy đầy đủ script countdown 15s và draggable từ phiên bản trước */
</script>
</body>
</html>
