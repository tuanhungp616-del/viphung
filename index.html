<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v9.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0f1a;font-family:'Segoe UI',Tahoma,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#fff}
    .glass{background:rgba(15,25,45,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:30px;padding:30px;width:90%;max-width:450px;box-shadow:0 20px 50px rgba(0,0,0,0.5)}
    .avatar{text-align:center;margin-bottom:20px}
    .avatar img{width:110px;height:110px;border-radius:50%;border:3px solid #00d2ff;box-shadow:0 0 30px rgba(0,210,255,0.4);animation: float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-size:2.2rem;text-align:center;background:linear-gradient(90deg,#00d2ff,#b347ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .input-field{width:100%;padding:15px;margin:12px 0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:1rem;outline:none;transition:0.3s}
    .input-field:focus{border-color:#00d2ff;box-shadow:0 0 15px rgba(0,210,255,0.3)}
    .btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#00d2ff,#b347ea);color:#fff;font-weight:bold;font-size:1.1rem;cursor:pointer;transition:0.3s;margin-top:10px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,210,255,0.4)}
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:20px;margin:15px 0;cursor:pointer;transition:0.3s;position:relative;overflow:hidden}
    .card:hover{border-color:#b347ea;transform:scale(1.02);box-shadow:0 10px 30px rgba(179,71,234,0.2)}
    .card h3{font-size:1.4rem;margin-bottom:5px}
    .card p{color:#aaa;font-size:0.9rem}
    .hidden{display:none!important}
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;z-index:100;animation:fadeIn 0.3s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .overlay-header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
    .overlay-header i{font-size:1.5rem;cursor:pointer;transition:0.2s}
    .overlay-header i:hover{color:#00d2ff}
    .dropdown-content{display:none;position:absolute;right:20px;top:70px;background:#1a1a2e;min-width:200px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.8);z-index:200;overflow:hidden}
    .dropdown-content a{color:#fff;padding:15px 20px;text-decoration:none;display:block;border-bottom:1px solid rgba(255,255,255,0.05);transition:0.2s}
    .dropdown-content a:hover{background:#00d2ff;color:#000}
    .show{display:block}
    .result-box{text-align:center;margin-top:30px}
    .prediction-number{font-size:7rem;font-weight:900;line-height:1;margin:20px 0;animation:pulse 2s infinite}
    .tai{color:#ff3366;text-shadow:0 0 30px rgba(255,51,102,0.5)}
    .xiu{color:#00d2ff;text-shadow:0 0 30px rgba(0,210,255,0.5)}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .info{font-size:1.1rem;color:#ccc;margin:10px 0}
    .info span{font-weight:bold;color:#fff}
    .loading{text-align:center;font-size:1.8rem;margin-top:50px}
    .loading i{animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    #modeDropdown a i{margin-right:10px}
  </style>
</head>
<body>

<!-- Màn hình đăng nhập -->
<div class="glass" id="loginScreen">
  <div class="avatar">
    <img src="https://i.ibb.co/QFDKgC1R/1783519521054.png" alt="Doraemon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616438.png'">
  </div>
  <h1>DORAEMON AI</h1>
  <input type="text" id="usernameInput" class="input-field" placeholder="Tên đăng nhập">
  <input type="password" id="passwordInput" class="input-field" placeholder="Mật khẩu">
  <button class="btn" onclick="login()">ĐĂNG NHẬP</button>
  <p id="loginError" style="color:red;text-align:center;margin-top:10px;"></p>
</div>

<!-- Màn hình chọn sàn -->
<div class="glass hidden" id="mainScreen">
  <h2 style="text-align:center;margin-bottom:25px;" id="welcomeText"></h2>
  <div class="card" onclick="openGame('lc79')">
    <h3>🏦 LC79.BET</h3>
    <p>Chọn chế độ chơi</p>
  </div>
  <div class="card" onclick="openGame('betvip')">
    <h3>🎰 BETVIP</h3>
    <p>Chọn chế độ chơi</p>
  </div>
  <button class="btn" style="background:#ff3366;margin-top:20px;" onclick="logout()">ĐĂNG XUẤT</button>
</div>

<!-- Overlay game -->
<div class="overlay hidden" id="gameOverlay">
  <div class="overlay-header">
    <i class="fas fa-arrow-left" onclick="closeGame()"></i>
    <span style="font-size:1.5rem;font-weight:bold;" id="gameTitle"></span>
    <i class="fas fa-ellipsis-v" onclick="toggleDropdown()"></i>
    <div class="dropdown-content" id="modeDropdown">
      <a href="#" onclick="selectMode('tx_md5')"><i class="fas fa-dice"></i> Tài Xỉu MD5</a>
      <a href="#" onclick="selectMode('tx_hu')"><i class="fas fa-coins"></i> Tài Xỉu Hũ</a>
      <a href="#" onclick="selectMode('xoc_dia')"><i class="fas fa-circle"></i> Xóc Đĩa</a>
    </div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
    <div id="selectedMode" style="font-size:1.3rem;margin-bottom:20px;color:#aaa;">Chọn chế độ từ menu góc trên phải</div>
    <div id="loadingIndicator" class="loading hidden"><i class="fas fa-spinner"></i> Đang phân tích cầu...</div>
    <div id="resultContainer" class="result-box hidden">
      <div style="font-size:1.3rem;">DỰ ĐOÁN</div>
      <div class="prediction-number" id="predictionText"></div>
      <div class="info">Phiên: <span id="sessionText"></span></div>
      <div class="info">Độ chính xác: <span id="accuracyText"></span>%</div>
    </div>
  </div>
</div>

<script>
let currentTool = '', currentMode = '', scanInterval = null;

function toggleDropdown() {
    document.getElementById("modeDropdown").classList.toggle("show");
}

function login() {
    const u = document.getElementById("usernameInput").value.trim();
    const p = document.getElementById("passwordInput").value.trim();
    if (u === "admin" && p === "admin123") {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("mainScreen").classList.remove("hidden");
        document.getElementById("welcomeText").innerText = "Xin chào, ADMIN";
    } else {
        document.getElementById("loginError").innerText = "Sai tài khoản hoặc mật khẩu!";
    }
}

function logout() {
    clearInterval(scanInterval);
    document.getElementById("mainScreen").classList.add("hidden");
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("usernameInput").value = '';
    document.getElementById("passwordInput").value = '';
}

function openGame(tool) {
    currentTool = tool;
    document.getElementById("gameTitle").innerText = tool.toUpperCase();
    document.getElementById("gameOverlay").classList.remove("hidden");
    document.getElementById("resultContainer").classList.add("hidden");
    document.getElementById("loadingIndicator").classList.add("hidden");
    document.getElementById("selectedMode").innerText = "Chọn chế độ từ menu góc trên phải";
    clearInterval(scanInterval);
}

function closeGame() {
    document.getElementById("gameOverlay").classList.add("hidden");
    clearInterval(scanInterval);
}

function selectMode(mode) {
    currentMode = mode;
    document.getElementById("modeDropdown").classList.remove("show");
    document.getElementById("selectedMode").innerText = "Chế độ: " + mode.replace("_", " ").toUpperCase();
    document.getElementById("resultContainer").classList.add("hidden");
    document.getElementById("loadingIndicator").classList.remove("hidden");
    fetchPrediction();
    clearInterval(scanInterval);
    scanInterval = setInterval(fetchPrediction, 5000);
}

async function fetchPrediction() {
    if (!currentTool || !currentMode) return;
    try {
        const res = await fetch(`/api/scan?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
        const data = await res.json();
        document.getElementById("loadingIndicator").classList.add("hidden");
        if (data.status === "success") {
            const pred = data.data.du_doan;
            const predEl = document.getElementById("predictionText");
            predEl.innerText = pred;
            predEl.className = "prediction-number " + (pred.includes("TÀI") ? "tai" : "xiu");
            document.getElementById("sessionText").innerText = data.data.phien;
            document.getElementById("accuracyText").innerText = data.data.ti_le;
            document.getElementById("resultContainer").classList.remove("hidden");
        }
    } catch (e) {
        document.getElementById("loadingIndicator").innerHTML = '<i class="fas fa-exclamation-triangle"></i> Lỗi kết nối';
    }
}

// Đóng dropdown khi click ra ngoài
window.onclick = function(e) {
    if (!e.target.matches('.fa-ellipsis-v')) {
        document.getElementById("modeDropdown").classList.remove("show");
    }
}
</script>
</body>
</html>
