<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hưng Admin Tool</title>
    <style>
        :root { --red-neon: #ff0000; --bg-dark: #0a0a0a; }
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        
        /* Giao diện chính */
        #game-container { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Nút 3 chấm góc phải */
        #menu-btn {
            position: absolute; top: 15px; right: 15px;
            width: 40px; height: 40px; background: rgba(0,0,0,0.7);
            border: 1px solid var(--red-neon); border-radius: 50%;
            color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        /* Danh sách Tool bên trái (Menu ẩn) */
        #tool-list {
            position: absolute; top: 60px; right: 15px;
            background: rgba(10,10,10,0.9); border: 1px solid var(--red-neon);
            border-radius: 8px; display: none; flex-direction: column; z-index: 100;
        }
        .tool-item { padding: 12px 20px; color: white; cursor: pointer; border-bottom: 1px solid #333; }
        .tool-item:hover { background: var(--red-neon); }

        /* Widget Dự đoán */
        #predict-widget {
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 2px solid #333;
            border-radius: 50px; padding: 10px 25px; display: flex;
            align-items: center; gap: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.3);
            cursor: move; z-index: 99;
        }
        .box { font-weight: bold; font-size: 1.2rem; color: #444; transition: 0.3s; }
        .phien-text { color: var(--red-neon); font-family: monospace; font-weight: bold; position: absolute; bottom: -25px; left: 10px; }

        /* Hiệu ứng nháy */
        .active-tai { color: #ffae00 !important; text-shadow: 0 0 10px #ffae00; animation: blink 0.5s infinite; }
        .active-xiu { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-btn">⋮</div>
    <div id="tool-list">
        <div class="tool-item" onclick="changeGame('lc79', 'https://lc79.bet')">LC79.BET</div>
        <div class="tool-item" onclick="changeGame('md5', 'https://lc79.bet')">TOOL MD5</div>
        <div class="tool-item" onclick="changeGame('betvip', 'https://betvip.fit')">BETVIP</div>
        <div class="tool-item" onclick="changeGame('sunwin', 'none')">SICBO SUNWIN</div>
    </div>

    <iframe id="game-frame" src="https://lc79.bet"></iframe>

    <div id="predict-widget">
        <div id="res-tai" class="box">TÀI</div>
        <div style="color: white; font-size: 0.8rem;">VS</div>
        <div id="res-xiu" class="box">XỈU</div>
        <div id="current-phien" class="phien-text">#000000</div>
    </div>
</div>

<script>
    const menuBtn = document.getElementById('menu-btn');
    const toolList = document.getElementById('tool-list');
    const taiBox = document.getElementById('res-tai');
    const xiuBox = document.getElementById('res-xiu');
    const phienBox = document.getElementById('current-phien');
    let currentTool = "lc79_tx";
    let isWaiting = false;

    // Hiện/Ẩn Menu
    menuBtn.onclick = () => toolList.style.display = toolList.style.display === 'flex' ? 'none' : 'flex';

    function changeGame(type, url) {
        if(url !== 'none') document.getElementById('game-frame').src = url;
        currentTool = type;
        toolList.style.display = 'none';
        alert("Đã chuyển sang: " + type);
    }

    // Logic xử lý chính
    async function updateTool() {
        if(isWaiting) return;

        try {
            const res = await fetch(`/api/scan?tool=${currentTool}&key=67`); // Thay key dynamic nếu cần
            const data = await res.json();

            if(data.status === "success") {
                phienBox.innerText = data.phien;
                
                // Hiệu ứng đợi 10 giây
                isWaiting = true;
                taiBox.className = "box"; xiuBox.className = "box";
                
                setTimeout(() => {
                    if(data.du_doan === "TÀI") taiBox.classList.add('active-tai');
                    else xiuBox.classList.add('active-xiu');
                    
                    isWaiting = false; // Sau khi hiển thị xong mới cho phép quét tiếp
                }, 10000); // Đợi 10 giây đúng yêu cầu
            }
        } catch (e) { console.log("Lỗi kết nối server"); }
    }

    // Kéo thả widget (Draggable đơn giản)
    const widget = document.getElementById('predict-widget');
    widget.onmousedown = (e) => {
        let shiftX = e.clientX - widget.getBoundingClientRect().left;
        let shiftY = e.clientY - widget.getBoundingClientRect().top;
        document.onmousemove = (e) => {
            widget.style.left = e.pageX - shiftX + 'px';
            widget.style.top = e.pageY - shiftY + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };

    setInterval(updateTool, 3000); // Kiểm tra phiên mỗi 3 giây
</script>

</body>
</html>
