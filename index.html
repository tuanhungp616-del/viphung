<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HƯNG DZKK - VIP MAX 1000+ | CHỦ TỊCH TUẤN HƯNG</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Orbitron:wght@500;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', sans-serif; }
    body { background: radial-gradient(circle at 50% 50%, #110000, #000000 90%); color: #fff; min-height: 100vh; overflow-x: hidden; position: relative; user-select: none; }
    canvas#particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.35; pointer-events:none; }
    :root { --gold-light: #FBF5B7; --gold-mid: #D4AF37; --gold-dark: #AA771C; --red-vip: #ff0000; --bg-glass: rgba(10, 5, 5, 0.9); }
    
    .glass-panel { background: var(--bg-glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 0, 0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 0, 0, 0.1); border-radius: 20px; }
    .container { max-width: 560px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 2; }
    
    #login-screen { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    .login-box { width: 100%; max-width: 380px; text-align: center; padding: 45px 25px; border-radius: 24px; border: 2px solid var(--red-vip); box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);}
    .login-box h2 { font-family: 'Playfair Display', serif; color: var(--gold-mid); font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
    .input-box { width: 100%; background: #000; border: 1px solid var(--gold-dark); padding: 18px; border-radius: 12px; color: var(--gold-light); font-size: 1.1rem; text-align: center; outline: none; transition: 0.3s; margin-bottom: 20px; font-family: 'Orbitron'; letter-spacing: 2px; }
    .input-box:focus { border-color: var(--red-vip); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
    .btn-gold { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); color: #000; font-size: 1.1rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4); transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: 'Orbitron';}
    .btn-gold:active { transform: scale(0.97); }

    .header { text-align: center; padding: 25px 15px; margin-bottom: 25px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; margin-bottom: 10px;}
    .badge { display: inline-block; background: #220000; border: 1px solid var(--red-vip); padding: 6px 20px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; color: var(--gold-light); letter-spacing: 2px; text-transform: uppercase; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);}
    
    .vip-menu { display: flex; background: rgba(0,0,0,0.9); border-radius: 15px; padding: 8px; margin-bottom: 25px; border: 1px solid rgba(212, 175, 55, 0.5); }
    .menu-item { flex: 1; text-align: center; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: 0.3s; color: #777; font-family: 'Orbitron';}
    .menu-item.active { background: linear-gradient(135deg, #aa0000, var(--red-vip)); color: #fff; box-shadow: 0 5px 20px rgba(255, 0, 0, 0.5); border: 1px solid var(--gold-light);}

    .card { background: rgba(10, 5, 5, 0.95); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255, 0, 0, 0.3); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .result-item { background: #000; border-radius: 15px; padding: 20px; margin-bottom: 16px; border-left: 4px solid var(--gold-mid); box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);}
    .big-percent { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 900; color: var(--gold-light); text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); margin-top: 5px;}
    .progress-bar-bg { height: 12px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin: 12px 0; border: 1px solid #333;}
    .progress-fill { height: 100%; background: linear-gradient(90deg, #AA771C, #FCF6BA); transition: width 1.2s cubic-bezier(0.2, 0.9, 0.3, 1.1); }
    .final-vip { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; text-align: center; padding: 20px; background: #0a0a0a; border-radius: 15px; border: 2px solid var(--gold-mid); margin: 20px 0; color: var(--gold-light); text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); }
    
    #game-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; animation: popIn 0.3s; }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    #game-frame { width: 100%; height: 100%; border: none; }
    .close-game-btn { position: absolute; top: 40px; left: 15px; background: #220000; color: var(--red-vip); border: 2px solid var(--red-vip); padding: 10px 20px; border-radius: 12px; font-weight: 900; z-index: 2005; cursor:pointer; font-family: 'Orbitron'; box-shadow: 0 0 15px rgba(255,0,0,0.5);}
    
    /* ROBOT NHÚN NHẢY ĐẾ VƯƠNG */
    #robotContainer {
      position: fixed; top: 40px; right: 15px;
      display: flex; align-items: center; z-index: 2001; cursor: grab;
      background: rgba(15, 0, 0, 0.85); backdrop-filter: blur(12px); border: 2px solid var(--red-vip);
      border-radius: 16px; box-shadow: 0 10px 40px rgba(255,0,0,0.3); padding: 12px 20px 12px 14px;
      width: max-content; max-width: 320px; transition: box-shadow 0.3s ease;
    }
    #robotContainer:active { cursor: grabbing; box-shadow: 0 12px 30px rgba(255,0,0,0.6); }
    .robotIconWrapper { width: 65px; height: 65px; margin-right: 15px; position: relative; flex-shrink: 0;}
    #robotIcon { width: 100%; height: 100%; animation: nhay 1.5s ease-in-out infinite; filter: drop-shadow(0 0 15px var(--red-vip)); border-radius: 12px; object-fit: contain;}
    #closeBtn { position: absolute; top: -8px; left: -8px; background: var(--red-vip); color: #fff; width: 22px; height: 22px; text-align: center; line-height: 22px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 0 8px red; border: 1px solid #fff;}
    @keyframes nhay { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    #robotText { display: flex; flex-direction: column; justify-content: center; }
    #line1 { font-size: 18px; font-weight: 900; font-family: 'Orbitron'; text-shadow: 0 0 10px rgba(255,255,255,0.3); white-space: nowrap; margin-bottom: 5px; color: #fff;}
    #line2 { font-size: 13px; color: var(--gold-mid); font-weight: 700; font-family: 'Montserrat'; white-space: nowrap;}
    
    .menu-content-panel { display: none; }
    .menu-content-panel.active-panel { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from {opacity:0; transform:translateY(15px);} to {opacity:1; transform:translateY(0);} }
  </style>
</head>
<body>
<canvas id="particles"></canvas>
