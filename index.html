<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DORAEMON V67 TOOL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
    body {
      background: linear-gradient(#00aaff, #00ffcc);
      background-image: url('https://i.ibb.co/PG9WgPqY/anh-doremon-anime-tuyet-ngau-084707549.jpg');
      background-size: cover;
      background-attachment: fixed;
      color: #fff;
      font-family: 'Comic Neue', cursive;
      margin: 0;
      padding: 0;
    }
    .header { background: rgba(0,0,0,0.75); padding: 15px; text-align: center; }
    .header h1 { font-size: 3.6rem; text-shadow: 0 0 30px #ffff00; }
    .nav { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 15px; background: rgba(0,0,0,0.85); }
    .btn { padding: 13px 26px; background: #ffff00; color: #000; border: none; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 20px #ffff00; }
    .btn:hover { transform: scale(1.08); }
    .content { padding: 20px; max-width: 1350px; margin: auto; }
    .tool-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 5px solid #fff; border-radius: 30px; padding: 20px; }
    #game-frame { width: 100%; height: 82vh; border: none; border-radius: 20px; margin-top: 15px; box-shadow: 0 0 40px rgba(0,255,255,0.7); }
    .result { font-size: 2.3rem; font-weight: 900; text-align: center; margin: 15px 0; text-shadow: 0 0 20px #ffff00; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div class="header">
  <h1>🛎️ DORAEMON V67 TOOL</h1>
</div>

<div class="nav">
  <button class="btn" onclick="openTool('sicbo_sunwin')"><i class="fas fa-dice"></i> SICBO SUN.WIN</button>
  <button class="btn" onclick="openTool('betvip_tx')"><i class="fas fa-gem"></i> BETVIP TX THƯỜNG</button>
  <button class="btn" onclick="openTool('betvip_md5')"><i class="fas fa-gem"></i> BETVIP TX MD5</button>
  <button class="btn" onclick="openTool('lc79_tx')"><i class="fas fa-globe"></i> LC79 TX THƯỜNG</button>
  <button class="btn" onclick="openTool('lc79_md5')"><i class="fas fa-globe"></i> LC79 TX MD5</button>
</div>

<div class="content">
  <div class="tool-box">
    <div id="result-display" class="result">Chọn game để bắt đầu dự đoán...</div>
    <iframe id="game-frame" src=""></iframe>
  </div>
</div>

<!-- Modal Nhập Key -->
<div id="keyModal" class="modal">
  <div class="glass" style="width:90%; max-width:420px; text-align:center; background:rgba(255,255,255,0.2);">
    <h2 style="color:#ffff00;">🔑 NHẬP KEY ĐỂ VÀO TOOL</h2>
    <input id="inputKey" placeholder="Nhập key..." style="width:100%; padding:15px; margin:15px 0; font-size:1.3rem; border-radius:15px; border:none;">
    <button onclick="checkKey()" style="width:100%; padding:15px; background:#ffff00; color:#000; border:none; border-radius:50px; font-weight:900;">XÁC NHẬN</button>
    <small style="display:block; margin-top:10px; color:#ffff00;">Admin: memaylc79 | User: em</small>
  </div>
</div>

<script>
// Danh sách key hợp lệ
const VALID_KEYS = {
  "memaylc79": "admin",
  "em": "user"
};

let currentTool = "";
let currentKey = "";

function openTool(tool) {
  currentTool = tool;
  document.getElementById('keyModal').style.display = 'flex';
  document.getElementById('inputKey').focus();
}

async function checkKey() {
  const keyInput = document.getElementById('inputKey').value.trim();
  
  if (!VALID_KEYS[keyInput]) {
    alert("❌ Key sai! Vui lòng nhập đúng key.");
    return;
  }

  currentKey = keyInput;
  document.getElementById('keyModal').style.display = 'none';

  // Mở iframe cho Sicbo Sun.win
  if (currentTool === 'sicbo_sunwin') {
    document.getElementById('game-frame').src = 'https://sunwin.ca';
  } else {
    document.getElementById('game-frame').src = '';
  }

  scanTool(currentTool);
}

async function scanTool(tool) {
  try {
    const res = await fetch(`/api/scan?tool=${tool}&key=${currentKey}`);
    const json = await res.json();
    if (json.status === "success") {
      const d = json.data;
      document.getElementById('result-display').innerHTML = `
        <span style="color:#ffff00;">#${d.phien || 'LIVE'} • ${d.du_doan}</span><br>
        <small style="font-size:1.1rem;">Độ tin cậy: ${d.ti_le}% | ${d.loi_khuyen}</small>
      `;
    } else {
      document.getElementById('result-display').innerHTML = `<span style="color:#ff0000;">${json.msg || 'Lỗi kết nối'}</span>`;
    }
  } catch(e) {
    document.getElementById('result-display').innerHTML = `<span style="color:#ff0000;">Lỗi kết nối server</span>`;
  }
}

// Tự động refresh mỗi 3 giây
setInterval(() => {
  if (currentTool && currentKey) {
    scanTool(currentTool);
  }
}, 3000);
</script>
</body>
</html>
