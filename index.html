<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HƯNG DZKK • INFINITY GOD MODE V5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-pink: #ff00ff;
      --neon-cyan: #00ffff;
      --neon-gold: #ffd700;
      --bg-glass: rgba(15, 5, 35, 0.92);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: radial-gradient(circle at 50% 20%, #1a0033, #000000 70%); color: #fff; min-height: 100vh; overflow-x: hidden; font-family: 'Rajdhani', sans-serif; position: relative; }
    canvas#particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.8; pointer-events:none; }
    .glass-panel { background: var(--bg-glass); backdrop-filter: blur(20px); border: 2px solid rgba(255,215,0,0.5); box-shadow: 0 0 40px #ffd700, inset 0 0 25px rgba(0,255,255,0.2); border-radius: 24px; }
    .container { max-width: 580px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 2; }
    .header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.7rem; background: linear-gradient(90deg, #ff00ff, #ffd700, #00ffff); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 35px #ffd700; }
    .badge { background: #000; border: 3px solid #ffd700; color: #ffd700; padding: 8px 30px; border-radius: 50px; font-weight: 900; letter-spacing: 3px; box-shadow: 0 0 25px #ffd700; }
    .btn-cosmic { background: linear-gradient(90deg, #ff00ff, #ffd700, #00ffff); color:#000; font-weight:900; padding:18px; border-radius:18px; box-shadow:0 0 45px #ffd700; transition:all 0.3s; }
    .btn-cosmic:hover { transform:scale(1.06); box-shadow:0 0 60px #ffd700; }
    .txbig { font-family:'Orbitron'; font-weight:900; text-align:center; }
    .dao-mode { color:#ffd700 !important; animation:pulse-gold 1s infinite alternate; }
    @keyframes pulse-gold { from {text-shadow:0 0 20px #ffd700;} to {text-shadow:0 0 50px #ffd700;} }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="container" id="main-tool">
  <div class="header glass-panel text-center py-4">
    <h1>HƯNG DZKK</h1>
    <div class="badge mt-2">INFINITY GOD MODE V5</div>
  </div>

  <div class="vip-menu glass-panel d-flex p-2 mb-4">
    <div class="menu-item active" data-menu="manual"><i class="fas fa-microchip"></i> MANUAL MD5</div>
    <div class="menu-item" data-menu="auto"><i class="fas fa-satellite-dish"></i> AUTO SCAN</div>
  </div>
    <!-- MANUAL PANEL -->
  <div id="menu-manual-panel" class="menu-content-panel active-panel">
    <div class="card glass-panel p-4">
      <input type="text" id="md5-input" class="glass-panel w-100 text-center py-4 fs-3" placeholder="DÁN MD5 32 KÝ TỰ..." maxlength="32">
      <button id="predict-btn" class="btn-cosmic w-100 mt-3"><i class="fas fa-atom fa-spin me-2"></i>PHÂN TÍCH VÔ HẠN V5</button>
    </div>
    <div id="results-section" style="display:none;" class="mt-4">
      <div id="loading-card" class="glass-panel text-center py-5" style="display:none;">
        <i class="fas fa-atom fa-spin" style="font-size:65px;color:#ffd700;"></i>
        <p class="mt-3 fw-bold" style="color:#ffd700;">ĐANG TÍNH QUANTUM V5...</p>
      </div>
      <div id="results-content" class="glass-panel p-4" style="display:none;">
        <div class="result-item"><div style="color:#ff00ff;font-weight:900;">📈 TÀI</div><div id="tai-value" class="big-percent">50.0%</div><div class="progress-bar-bg"><div id="tai-bar" class="progress-fill" style="width:50%"></div></div></div>
        <div class="result-item"><div style="color:#00ffff;font-weight:900;">📉 XỈU</div><div id="xiu-value" class="big-percent">50.0%</div><div class="progress-bar-bg"><div id="xiu-bar" class="progress-fill" style="width:50%"></div></div></div>
        <div id="final-result" class="glass-panel text-center py-4 fw-bold fs-4" style="border:3px solid #ffd700;color:#ffd700;"></div>
      </div>
    </div>
  </div>

  <!-- AUTO PANEL -->
  <div id="menu-auto-panel" class="menu-content-panel">
    <div class="card glass-panel p-4">
      <div class="text-center fw-bold fs-4" style="color:#ffd700;"><i class="fas fa-terminal"></i> ADMIN PANEL</div>
      <input id="target-key" class="glass-panel w-100 text-center py-3 mt-3" placeholder="Nhập key cần lock/unlock">
      <div class="d-flex gap-3 mt-3">
        <button onclick="adminAction('lock')" class="btn-cosmic flex-fill">🔒 LOCK</button>
        <button onclick="adminAction('unlock')" class="btn-cosmic flex-fill">🔓 UNLOCK</button>
      </div>
      <div id="admin-msg" class="text-center mt-3 fw-bold" style="color:#ffd700;"></div>
    </div>

    <!-- Các tool -->
    <div class="card glass-panel p-4">
      <div style="color:#00ffff;font-weight:900;">LC79.BET</div>
      <button class="btn-cosmic w-100 mt-2" onclick="startAutoAPI('lc79_tx','https://lc79.bet')">TX LC79</button>
      <button class="btn-cosmic w-100 mt-2" onclick="startAutoAPI('lc79_md5','https://lc79.bet')">MD5 LC79</button>
      <button class="btn-cosmic w-100 mt-2" style="background:#ff00ff;color:#fff;" onclick="startAutoAPI('lc79_xd','https://lc79.bet')">XÓC ĐĨA LC79</button>
    </div>
    <div class="card glass-panel p-4">
      <div style="color:#00ffff;font-weight:900;">BETVIP</div>
      <button class="btn-cosmic w-100 mt-2" onclick="startAutoAPI('betvip_tx','https://play.betvip.fit/')">TX BETVIP</button>
      <button class="btn-cosmic w-100 mt-2" onclick="startAutoAPI('betvip_md5','https://play.betvip.fit/')">MD5 BETVIP</button>
    </div>
    <div class="card glass-panel p-4">
      <div style="color:#ff00ff;font-weight:900;">SUNWIN SICBO</div>
      <button class="btn-cosmic w-100 mt-2" onclick="startAutoAPI('sunwin_sicbo','')">SICBO SUNWIN FULL AUTO</button>
    </div>
  </div>
</div>

<!-- GAME OVERLAY (khi click tool sẽ hiện ngay) -->
<div id="game-overlay" style="display:none;position:fixed;inset:0;z-index:2000;background:#000;">
  <div style="width:100%;background:linear-gradient(90deg,#1a0033,#000);color:#ffd700;padding:12px;border-bottom:3px solid #ffd700;display:flex;align-items:center;gap:10px;font-family:'Orbitron';">
    <i class="fas fa-infinity"></i><marquee>∞ GOD MODE V5 • AI NHẬN CẦU CHÍNH XÁC • ĐẢO CẦU TỰ ĐỘNG ∞</marquee>
  </div>
  <button onclick="closeGame()" style="position:absolute;top:25px;left:25px;background:#000;color:#ff00ff;border:3px solid #ff00ff;padding:12px 28px;border-radius:50px;font-weight:900;z-index:9999;">THOÁT</button>
  <iframe id="game-frame" src="" style="width:100%;height:100%;border:none;"></iframe>

  <div id="bridge-detect-panel" class="glass-panel" style="position:absolute;top:30px;right:20px;width:220px;padding:18px;z-index:2001;">
    <div class="text-center" style="color:#ffd700;"><i class="fas fa-robot"></i> AI CORE V5</div>
    <img src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png" style="width:78px;height:78px;border:4px solid #ff00ff;border-radius:50%;margin:12px auto;display:block;">
    <div id="auto-advice" class="text-center fw-bold" style="color:#ffd700;">ĐANG KẾT NỐI...</div>
    <div class="text-center">PHIÊN: <span id="auto-phien" style="color:#ffd700;font-weight:900;"></span></div>
    <div class="txbig" id="auto-big" style="font-size:44px;margin:15px 0;"></div>
    <div class="progress-bar-bg"><div class="progress-fill" id="auto-bar"></div></div>
    <div id="auto-pct" class="text-center fw-bold" style="color:#00ffff;">0%</div>
  </div>

  <div id="big-center-panel" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:460px;background:var(--bg-glass);border:4px solid #ffd700;border-radius:30px;padding:40px 30px;z-index:2002;flex-direction:column;align-items:center;">
    <h2 style="color:#ffd700;font-size:2.6rem;">∞ GOD MODE V5</h2>
    <div id="big-result" class="txbig" style="font-size:92px;margin:20px 0;"></div>
    <div id="big-advice" class="text-center fw-bold"></div>
    <div class="progress-bar-bg w-100"><div class="progress-fill" id="big-bar"></div></div>
    <div id="big-pct-text" class="text-center fw-bold mt-2" style="color:#00ffff;">0%</div>
  </div>
</div>

<script>
/* Particles */
const canvas = document.getElementById('particles'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
class Particle { constructor() { this.reset(); } reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*3+1; this.speed = Math.random()*2+1; } update() { this.y -= this.speed; if(this.y<0)this.reset(); } draw() { ctx.fillStyle = '#ffd700'; ctx.fillRect(this.x,this.y,this.size,this.size*3); }}
let particles = []; for(let i=0;i<80;i++) particles.push(new Particle());
function animateParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animateParticles); }
animateParticles(); window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

/* Script logic (giữ nguyên từ phiên bản trước, đã fix click tool hiện ngay) */
let currentUserKey = "", autoInterval, activeGame = "", phienCu = "", isAnalyzing = false;

document.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.menu-content-panel').forEach(p => p.classList.remove('active-panel'));
    document.getElementById(`menu-${item.dataset.menu}-panel`).classList.add('active-panel');
  });
});

document.getElementById('predict-btn').addEventListener('click', async () => { /* giữ nguyên logic manual */ });

async function adminAction(actionType) { /* giữ nguyên */ }

function clearUI() { /* giữ nguyên */ }
async function loopAuto() { /* giữ nguyên, đã fix hiển thị tool */ }
function startAutoAPI(tool, url) {
  document.getElementById('game-overlay').style.display = "block";
  clearInterval(autoInterval); phienCu = ""; activeGame = tool; clearUI(); isAnalyzing = false;
  if (tool.includes('sunwin_sicbo')) {
    document.getElementById('game-frame').style.display = "none";
    document.getElementById('big-center-panel').style.display = "flex";
  } else {
    document.getElementById('game-frame').style.display = "block";
    document.getElementById('game-frame').src = url;
    document.getElementById('bridge-detect-panel').style.display = "block";
    document.getElementById('big-center-panel').style.display = "none";
  }
  loopAuto(); autoInterval = setInterval(loopAuto, 1800);
}
function closeGame() { clearInterval(autoInterval); isAnalyzing = false; document.getElementById('game-overlay').style.display = 'none'; document.getElementById('game-frame').src = ''; }

document.querySelectorAll('.menu-item').forEach(item => { /* menu switch */ });
</script>
</body>
</html>
