<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HƯNG DZKK • DORAEMON GOD MODE 3.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dora-blue: #00aaff;
      --dora-yellow: #ffcc00;
      --red: #ff0000;
      --green: #00ff00;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background: radial-gradient(circle at 50% 20%, #00aaff, #001133 80%); 
      color: #fff; min-height: 100vh; overflow-x: hidden; 
      font-family: 'Comic Neue', cursive; position: relative;
    }
    canvas#particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.8; pointer-events:none; }

    .glass-panel { 
      background: rgba(255,255,255,0.12); backdrop-filter: blur(25px); 
      border: 4px solid #ffcc00; border-radius: 30px; 
      box-shadow: 0 0 45px #ffcc00; 
    }
    .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 2; }

    /* LOGIN */
    #login-screen { position: fixed; inset: 0; background: rgba(0,170,255,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 400px; padding: 60px 40px; text-align: center; background: #fff; border-radius: 30px; box-shadow: 0 0 50px #ffcc00; }
    .input-box { width: 100%; background: #f0f8ff; border: 4px solid #00aaff; color: #00aaff; padding: 22px; border-radius: 20px; font-size: 1.4rem; text-align: center; outline: none; }
    .btn-luxury { width: 100%; padding: 20px; background: linear-gradient(90deg, #ffcc00, #00aaff); color: #000; font-weight: 900; font-size: 1.45rem; border-radius: 25px; margin-top: 25px; box-shadow: 0 0 35px #ffcc00; }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box glass-panel">
    <h1 style="color:#00aaff; font-size:2.8rem;">🛎️ DORAEMON</h1>
    <p style="color:#ffcc00; margin:20px 0 35px; font-size:1.4rem;">GOD MODE 3.0</p>
    <input type="password" id="login-key" class="input-box" placeholder="NHẬP KEY...">
    <button onclick="submitLogin()" class="btn-luxury">🚀 KHỞI ĐỘNG</button>
    <div id="login-msg" class="mt-4 fw-bold" style="color:#ff0000; min-height:28px;"></div>
  </div>
</div>
<!-- MAIN TOOL -->
<div class="container" id="main-tool" style="display:none;">
  <div class="header glass-panel">
    <h1>🛎️ DORAEMON</h1>
    <div class="badge">GOD MODE 3.0 • PHIÊN TIẾP THEO</div>
  </div>

  <div class="tool-grid">
    <div class="tool-card glass-panel" onclick="startAutoAPI('lc79_tx', 'https://lc79.bet')">
      <i class="fas fa-gem fa-3x" style="color:#00aaff;"></i>
      <h4 style="color:#00aaff; margin-top:12px;">LC79 TX</h4>
      <p class="text-light">Tài Xỉu LC79</p>
    </div>
    <div class="tool-card glass-panel" onclick="startAutoAPI('lc79_md5', 'https://lc79.bet')">
      <i class="fas fa-code fa-3x" style="color:#ffcc00;"></i>
      <h4 style="color:#ffcc00; margin-top:12px;">LC79 MD5</h4>
      <p class="text-light">MD5 LC79</p>
    </div>
    <div class="tool-card glass-panel" onclick="startAutoAPI('lc79_xd', 'https://lc79.bet')">
      <i class="fas fa-dice fa-3x" style="color:#ff00ff;"></i>
      <h4 style="color:#ff00ff; margin-top:12px;">XÓC ĐĨA LC79</h4>
      <p class="text-light">Xóc Đĩa LC79</p>
    </div>
    <div class="tool-card glass-panel" onclick="startAutoAPI('sunwin_sicbo', 'https://sunwin.ca')">
      <i class="fas fa-dice-six fa-3x" style="color:#ff00ff;"></i>
      <h4 style="color:#ff00ff; margin-top:12px;">SICBO SUN.WIN</h4>
      <p class="text-light">Sicbo Sunwin</p>
    </div>
    <div class="tool-card glass-panel" onclick="startAutoAPI('betvip_tx', 'https://play.betvip.fit/')">
      <i class="fas fa-crown fa-3x" style="color:#00aaff;"></i>
      <h4 style="color:#00aaff; margin-top:12px;">BETVIP TX</h4>
      <p class="text-light">Tài Xỉu Betvip</p>
    </div>
    <div class="tool-card glass-panel" onclick="startAutoAPI('betvip_md5', 'https://play.betvip.fit/')">
      <i class="fas fa-key fa-3x" style="color:#ffcc00;"></i>
      <h4 style="color:#ffcc00; margin-top:12px;">BETVIP MD5</h4>
      <p class="text-light">MD5 Betvip</p>
    </div>
  </div>
</div>

<!-- GAME OVERLAY - GIAO DIỆN MỚI THEO YÊU CẦU -->
<div id="game-overlay" style="display:none; position:fixed; inset:0; z-index:2000; background:#001133;">
  <div style="width:100%; background:linear-gradient(90deg,#00aaff,#ffcc00); color:#000; padding:16px; border-bottom:4px solid #ffcc00; display:flex; align-items:center; gap:15px; font-family:'Comic Neue'; font-size:16px; font-weight:700;">
    <i class="fas fa-infinity fa-spin"></i>
    <marquee scrollamount="12">🛎️ DORAEMON GOD MODE 3.0</marquee>
  </div>

  <button onclick="closeGame()" style="position:absolute; top:28px; left:28px; background:#000; color:#ffcc00; border:3px solid #ffcc00; padding:14px 34px; border-radius:50px; font-weight:900; z-index:9999;">✕ THOÁT</button>

  <iframe id="game-frame" src="" style="width:100%; height:100%; border:none; display:none;"></iframe>

  <!-- TOOL DISPLAY NHỎ Ở GIỮA -->
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; z-index:2005; width:100%; max-width:420px;">
    <div style="display:flex; justify-content:center; align-items:center; gap:40px; margin-bottom:20px;">
      <!-- Bên trái - ĐỎ = TÀI -->
      <div style="width:70px; height:70px; background:#ff0000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff; box-shadow:0 0 25px #ff0000;">T</div>
      
      <!-- Ảnh tool nhỏ ở giữa -->
      <div id="tool-image-container">
        <img id="tool-image" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png" style="width:160px; height:160px; border:6px solid #ffcc00; border-radius:50%; box-shadow:0 0 30px #ffcc00;">
      </div>
      
      <!-- Bên phải - XANH = XỈU -->
      <div style="width:70px; height:70px; background:#00ff00; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff; box-shadow:0 0 25px #00ff00;">X</div>
    </div>

    <!-- Countdown -->
    <div id="countdown-box" style="font-size:22px; color:#ffcc00; font-weight:700; margin-top:10px; display:none;">
      ĐỢI <span id="countdown" style="font-size:32px;">15</span> GIÂY
    </div>

    <!-- Mã phiên -->
    <div style="position:absolute; bottom:20px; right:30px; background:#000; color:#ffcc00; padding:6px 18px; border-radius:20px; font-size:15px; font-weight:700;">
      MÃ PHIÊN: <span id="auto-phien" style="color:#ffd700;"></span>
    </div>

    <!-- Kết quả báo dưới -->
    <div id="result-text" style="position:absolute; bottom:80px; left:30px; font-size:28px; font-weight:900; display:none;"></div>
  </div>
</div>

<script>
/* Particles */
const canvas = document.getElementById('particles'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
class Particle { constructor() { this.reset(); } reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*4+1; this.speed = Math.random()*2.8+1; } update() { this.y -= this.speed; if(this.y<0)this.reset(); } draw() { ctx.fillStyle = '#ffcc00'; ctx.fillRect(this.x,this.y,this.size,this.size*3); }}
let particles = []; for(let i=0;i<90;i++) particles.push(new Particle());
function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate); }
animate(); window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

let currentUserKey = "", autoInterval, activeGame = "", currentUrl = "", phienCu = "", isAnalyzing = false;

/* LOGIN */
async function submitLogin() {
  const key = document.getElementById('login-key').value.trim();
  const msg = document.getElementById('login-msg');
  if (key === "hungne" || key === "67") {
    currentUserKey = key;
    document.getElementById('login-screen').style.display = "none";
    document.getElementById('main-tool').style.display = "block";
  } else {
    msg.innerHTML = "❌ KEY SAI! Thử lại nhé Doraemon!";
  }
}

/* START TOOL - HIỆN NGAY */
function startAutoAPI(tool, url) {
  document.getElementById('game-overlay').style.display = "block";
  clearInterval(autoInterval); phienCu = ""; activeGame = tool; currentUrl = url;
  clearUI(); isAnalyzing = false;

  if (tool.includes('sunwin_sicbo')) {
    document.getElementById('game-frame').style.display = "none";
  } else {
    document.getElementById('game-frame').style.display = "block";
    document.getElementById('game-frame').src = url;
  }
  loopAuto();
  autoInterval = setInterval(loopAuto, 1700);
}

function clearUI() {
  document.getElementById('auto-advice').innerText = "ĐANG PHÂN TÍCH CẦU...";
  document.getElementById('auto-phien').innerText = "...";
  document.getElementById('countdown-box').style.display = "none";
  document.getElementById('result-text').style.display = "none";
}

async function loopAuto() {
  if (isAnalyzing) return;
  try {
    const res = await fetch(`/api/scan?tool=${activeGame}&key=${currentUserKey}`);
    const json = await res.json();
    if (json.status === "success") {
      const data = json.data;
      if (data.phien !== phienCu) {
        isAnalyzing = true;
        phienCu = data.phien;
        document.getElementById('auto-phien').innerText = data.phien;

        // Countdown 15 giây
        document.getElementById('countdown-box').style.display = "block";
        let countdown = 15;
        const timer = setInterval(() => {
          document.getElementById('countdown').innerText = countdown;
          countdown--;
          if (countdown < 0) {
            clearInterval(timer);
            document.getElementById('countdown-box').style.display = "none";
            // Hiển thị kết quả dự đoán
            const resultText = document.getElementById('result-text');
            if (data.du_doan.includes("TÀI")) {
              resultText.innerHTML = '🔴 <b>TÀI</b>';
              resultText.style.color = '#ff0000';
              document.getElementById('tool-image').classList.add('red-glow');
            } else {
              resultText.innerHTML = '🟢 <b>XỈU</b>';
              resultText.style.color = '#00ff00';
              document.getElementById('tool-image').classList.add('green-glow');
            }
            resultText.style.display = 'block';
            isAnalyzing = false;
          }
        }, 1000);
      }
    }
  } catch(e) {}
}

function closeGame() {
  clearInterval(autoInterval);
  isAnalyzing = false;
  document.getElementById('game-overlay').style.display = 'none';
  document.getElementById('game-frame').src = '';
}

/* KÉO THẢ BRIDGE PANEL */
function makeDraggable(elmnt) {
  let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  elmnt.onmousedown = dragMouseDown; elmnt.ontouchstart = dragMouseDown;
  function dragMouseDown(e) {
    e = e || window.event;
    if(e.type==='touchstart'){ pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; }
    else { pos3 = e.clientX; pos4 = e.clientY; }
    document.onmouseup = closeDragElement; document.onmousemove = elementDrag;
    document.ontouchend = closeDragElement; document.ontouchmove = elementDrag;
  }
  function elementDrag(e) {
    e = e || window.event;
    if(e.type==='touchmove'){ pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY; pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; }
    else { pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; }
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }
  function closeDragElement() { document.onmouseup = document.onmousemove = document.ontouchend = document.ontouchmove = null; }
}
makeDraggable(document.getElementById("bridge-detect-panel"));
</script>
</body>
</html>
